<svg xmlns="http://www.w3.org/2000/svg" width="720" height="434" viewBox="0 0 720 434" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace" font-size="13">
  <rect x="0" y="0" width="720" height="434" rx="10" fill="#1c1f26"/>
  <rect x="0" y="0" width="720" height="30" rx="10" fill="#2a2e38"/>
  <rect x="0" y="20" width="720" height="10" fill="#2a2e38"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="5" fill="#febc2e"/>
  <circle cx="56" cy="15" r="5" fill="#28c840"/>
  <text x="360" y="19" fill="#8b93a7" text-anchor="middle" font-size="12">sneakpack — offline sync via bundle files</text>

  <text x="20" y="56" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> sneakpack pack ~/field --since base.cursor -o day2.spk   <tspan fill="#5c6370"># field laptop</tspan></text>
  <text x="20" y="76" fill="#c8ceda">packed 3 change(s) -&gt; day2.spk</text>
  <text x="20" y="94" fill="#8b93a7">  base   <tspan fill="#61afef">9a1ef7189f18</tspan></text>
  <text x="20" y="112" fill="#8b93a7">  target <tspan fill="#c678dd">661a9bddb0a3</tspan></text>
  <text x="20" y="130" fill="#8b93a7">  2 payload file(s), 30 B raw, bundle 627 B</text>

  <text x="20" y="160" fill="#5c6370"># …the bundle rides a USB stick across the airgap…</text>

  <text x="20" y="190" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> sneakpack verify day2.spk   <tspan fill="#5c6370"># back at base, still offline</tspan></text>
  <text x="20" y="210" fill="#c8ceda">verify day2.spk: <tspan fill="#28c840">ok</tspan></text>
  <text x="20" y="228" fill="#8b93a7">  manifest consistent, 2 payload file(s) hash-checked</text>
  <text x="20" y="246" fill="#8b93a7">  base <tspan fill="#61afef">9a1ef7189f18</tspan> -&gt; target <tspan fill="#c678dd">661a9bddb0a3</tspan></text>

  <text x="20" y="276" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> sneakpack apply day2.spk ~/mirror</text>
  <text x="20" y="296" fill="#c8ceda">applied day2.spk -&gt; ~/mirror</text>
  <text x="20" y="314" fill="#c8ceda">  1 added, 1 modified, 1 deleted</text>
  <text x="20" y="332" fill="#c8ceda">  <tspan fill="#28c840">verified:</tspan> tree matches cursor <tspan fill="#c678dd">661a9bddb0a3</tspan></text>

  <text x="20" y="362" fill="#9aa2b5"><tspan fill="#28c840">$</tspan> sneakpack apply day2.spk ~/mirror   <tspan fill="#5c6370"># same stick, twice</tspan></text>
  <text x="20" y="382" fill="#c8ceda"><tspan fill="#e06c75">sneakpack:</tspan> bundle does not chain: it was packed against cursor</text>
  <text x="20" y="400" fill="#c8ceda"><tspan fill="#61afef">9a1ef7189f18</tspan> but this tree is at <tspan fill="#c678dd">661a9bddb0a3</tspan> (apply intermediate</text>
  <text x="20" y="418" fill="#c8ceda">bundles first, or --force to override)</text>
</svg>
